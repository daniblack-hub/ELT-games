<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom Recitation Tool</title>
    <style>
        :root {
            --bg-color: #f7f9fb;
            --card-bg: #ffffff;
            --accent-primary: #b8e1dd; /* Mint Pastel */
            --accent-secondary: #dcd3ff; /* Lavender Pastel */
            --accent-tertiary: #ffdfd3; /* Peach/Blush Pastel */
            --text-main: #4a4a4a;
            --text-muted: #7a7a7a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
        }

        h1 { font-weight: 300; margin-bottom: 30px; color: var(--text-muted); }

        /* Configuration Styling */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        label { font-size: 0.9rem; margin-bottom: 5px; color: var(--text-muted); }

        input {
            padding: 12px;
            border: 2px solid var(--bg-color);
            border-radius: 10px;
            font-size: 1.1rem;
            outline: none;
            transition: border 0.3s;
        }

        input:focus { border-color: var(--accent-secondary); }

        /* Main Display */
        #display-box {
            font-size: 8rem;
            font-weight: bold;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-color);
            border-radius: 15px;
            margin: 20px 0;
            color: var(--text-main);
            transition: all 0.2s ease;
            border: 4px solid transparent;
        }

        .rolling {
            animation: pulse 0.1s infinite;
            color: var(--text-muted) !important;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        /* Buttons */
        button {
            cursor: pointer;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:active { transform: scale(0.95); }

        .btn-generate {
            width: 100%;
            padding: 20px;
            font-size: 1.5rem;
            background-color: var(--accent-primary);
            color: #446d6a;
            margin-bottom: 15px;
        }

        .btn-secondary {
            padding: 10px 15px;
            background-color: var(--accent-secondary);
            color: #5a527a;
            font-size: 0.9rem;
        }

        /* History */
        .history-section {
            margin-top: 30px;
            border-top: 1px solid var(--bg-color);
            padding-top: 20px;
        }

        #history-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            list-style: none;
            padding: 0;
        }

        .history-item {
            background: var(--accent-tertiary);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h1>Who's the lucky one?</h1>

    <div class="controls">
        <div class="input-group">
            <label>Start Number</label>
            <input type="number" id="startRange" value="1">
        </div>
        <div class="input-group">
            <label>End Number</label>
            <input type="number" id="endRange" value="30">
        </div>
    </div>

    <div id="display-box">?</div>

    <button class="btn-generate" onclick="generateNumber()">PICK A STUDENT</button>
    
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <button class="btn-secondary" onclick="clearHistory()">Clear History</button>
        <label style="font-size: 0.85rem;">
            <input type="checkbox" id="noRepeat" checked> Avoid Immediate Repeat
        </label>
    </div>

    <div class="history-section">
        <label>Previous Numbers</label>
        <ul id="history-list"></ul>
    </div>
</div>

<script>
    let lastNumber = null;
    const historyList = document.getElementById('history-list');
    const displayBox = document.getElementById('display-box');

    function generateNumber() {
        const start = parseInt(document.getElementById('startRange').value);
        const end = parseInt(document.getElementById('endRange').value);
        const avoidRepeat = document.getElementById('noRepeat').checked;

        if (isNaN(start) || isNaN(end) || start >= end) {
            alert("Please enter a valid range.");
            return;
        }

        // Animation Effect
        displayBox.classList.add('rolling');
        
        let counter = 0;
        const interval = setInterval(() => {
            displayBox.innerText = Math.floor(Math.random() * (end - start + 1)) + start;
            counter++;
            if (counter > 10) {
                clearInterval(interval);
                finalizeSelection(start, end, avoidRepeat);
            }
        }, 50);
    }

    function finalizeSelection(start, end, avoidRepeat) {
        displayBox.classList.remove('rolling');
        let result;

        do {
            result = Math.floor(Math.random() * (end - start + 1)) + start;
        } while (avoidRepeat && result === lastNumber && (end - start) > 0);

        displayBox.innerText = result;
        lastNumber = result;

        // Add to history
        const li = document.createElement('li');
        li.className = 'history-item';
        li.innerText = result;
        historyList.prepend(li);

        // Keep history manageable
        if (historyList.children.length > 10) {
            historyList.removeChild(historyList.lastChild);
        }
    }

    function clearHistory() {
        historyList.innerHTML = '';
        displayBox.innerText = '?';
        lastNumber = null;
    }
</script>

</body>
</html>
