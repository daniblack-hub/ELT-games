<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moody Sunset Timer</title>
    <style>
        :root {
            --deep-indigo: #1a1a2e;
            --dusky-rose: #a55c7b;
            --sunset-orange: #e67e22;
            --twilight-purple: #2d1b4e;
            --text-gold: #f39c12;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, var(--deep-indigo) 0%, var(--twilight-purple) 40%, var(--dusky-rose) 80%, var(--sunset-orange) 100%);
            color: white;
            overflow: hidden;
        }

        .timer-card {
            background: rgba(26, 26, 46, 0.9);
            backdrop-filter: blur(15px);
            padding: 2.5rem;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            text-align: center;
            width: 350px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h2 {
            margin-top: 0;
            color: var(--text-gold);
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-size: 1.2rem;
        }

        .inputs {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            width: 30%;
        }

        input {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid var(--dusky-rose);
            color: var(--sunset-orange);
            padding: 12px;
            font-size: 1.5rem;
            border-radius: 12px;
            text-align: center;
            outline: none;
        }

        .display {
            font-size: 4.5rem;
            font-weight: 200;
            margin: 1rem 0;
            font-family: 'Courier New', monospace;
            color: white;
            text-shadow: 0 0 15px rgba(230, 126, 34, 0.6);
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .main-btns {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 14px;
            font-size: 0.9rem;
            cursor: pointer;
            border: none;
            border-radius: 12px;
            transition: all 0.2s;
            font-weight: bold;
            text-transform: uppercase;
        }

        .start-btn { background: var(--sunset-orange); color: var(--deep-indigo); flex: 2; }
        .reset-btn { background: transparent; color: var(--dusky-rose); border: 1px solid var(--dusky-rose); flex: 1; }
        
        .test-btn {
            background: rgba(255,255,255,0.05);
            color: #888;
            font-size: 0.7rem;
            margin-top: 10px;
            border: 1px dashed #444;
        }

        button:hover { opacity: 0.8; transform: translateY(-1px); }
    </style>
</head>
<body>

<div class="timer-card">
    <h2>Focus Timer</h2>
    
    <div class="inputs">
        <div class="input-group"><input type="number" id="hh" placeholder="00"><label>Hrs</label></div>
        <div class="input-group"><input type="number" id="mm" placeholder="00"><label>Min</label></div>
        <div class="input-group"><input type="number" id="ss" placeholder="00"><label>Sec</label></div>
    </div>

    <div class="display" id="timer-display">00:00:00</div>

    <div class="controls">
        <div class="main-btns">
            <button class="start-btn" id="startBtn" onclick="toggleTimer()">Start</button>
            <button class="reset-btn" onclick="resetTimer()">Reset</button>
        </div>
        <button class="test-btn" onclick="testSound()">Test Alarm Sound</button>
    </div>
</div>

<audio id="alarmSound" crossorigin="anonymous">
    <source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" type="audio/mpeg">
</audio>

<script>
    let countdown;
    let totalSeconds = 0;
    let isRunning = false;
    const alarm = document.getElementById('alarmSound');

    // Pre-load sound on first click to bypass browser blocks
    document.body.addEventListener('click', () => {
        alarm.load();
    }, { once: true });

    function testSound() {
        alarm.play();
        setTimeout(() => { alarm.pause(); alarm.currentTime = 0; }, 2000);
    }

    function updateDisplay(seconds) {
        const h = Math.floor(seconds / 3600);
        const m = Math.floor((seconds % 3600) / 60);
        const s = seconds % 60;
        document.getElementById('timer-display').textContent = 
            `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    function toggleTimer() {
        const startBtn = document.getElementById('startBtn');
        
        if (isRunning) {
            clearInterval(countdown);
            startBtn.textContent = 'Resume';
            isRunning = false;
        } else {
            if (totalSeconds <= 0) {
                const h = parseInt(document.getElementById('hh').value) || 0;
                const m = parseInt(document.getElementById('mm').value) || 0;
                const s = parseInt(document.getElementById('ss').value) || 0;
                totalSeconds = (h * 3600) + (m * 60) + s;
            }

            if (totalSeconds <= 0) return;

            isRunning = true;
            startBtn.textContent = 'Pause';
            
            countdown = setInterval(() => {
                totalSeconds--;
                if (totalSeconds >= 0) updateDisplay(totalSeconds);

                if (totalSeconds <= 0) {
                    clearInterval(countdown);
                    isRunning = false;
                    startBtn.textContent = 'Start';
                    
                    // Play alarm
                    alarm.loop = true;
                    alarm.play().catch(e => console.log("Audio play failed:", e));
                    
                    setTimeout(() => { 
                        if(confirm("Time is up! Stop alarm?")) {
                            alarm.pause();
                            alarm.currentTime = 0;
                        }
                    }, 100);
                }
            }, 1000);
        }
    }

    function resetTimer() {
        clearInterval(countdown);
        alarm.pause();
        alarm.currentTime = 0;
        isRunning = false;
        totalSeconds = 0;
        updateDisplay(0);
        document.getElementById('startBtn').textContent = 'Start';
    }
</script>

</body>
</html>
